name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    name: ${{ matrix.IMAGES }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        IMAGES: [nginx, hentaiathome, puppeteer]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: qemu
        uses: docker/setup-qemu-action@v3

      - name: buildx
        uses: docker/setup-buildx-action@v3

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        uses: docker/build-push-action@v6
        with:
          push: true
          context: ${{ matrix.IMAGES }}
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ github.actor }}/${{ matrix.IMAGES }}:latest
  minecraft:
    name: minecraft ${{ matrix.VERSION }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        VERSION: [
          "1.21.4",
          "1.21.5"
        ]
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: qemu
        uses: docker/setup-qemu-action@v3

      - name: buildx
        uses: docker/setup-buildx-action@v3

      - name: login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: build
        uses: docker/build-push-action@v6
        with:
          push: true
          context: papermc
          platforms: linux/amd64,linux/arm64
          build-args: MC_VERSION=${{ matrix.VERSION }}
          tags: ghcr.io/${{ github.actor }}/minecraft:${{ matrix.VERSION }}
